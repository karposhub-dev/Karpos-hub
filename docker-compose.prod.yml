version: '3.8'\nservices:\n  web:\n    image: myapp:latest\n    ports:\n      - '80:80'\n    environment:\n      - ENV=production\n      - DATABASE_URL=mysql://user:password@db:3306/mydatabase\n    depends_on:\n      - db\n    networks:\n      - mynetwork\n  db:\n    image: mysql:5.7\n    restart: always\n    environment:\n      MYSQL_ROOT_PASSWORD: rootpassword\n      MYSQL_DATABASE: mydatabase\n      MYSQL_USER: user\n      MYSQL_PASSWORD: password\n    volumes:\n      - db_data:/var/lib/mysql\n    networks:\n      - mynetwork\nnetworks:\n  mynetwork:\nvolumes:\n  db_data: